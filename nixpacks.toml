providers = ["node", "python"]

[phases.setup]
nixPkgs = ["tesseract", "tesseract-lang"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "pip install -r backend/requirements.txt"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
